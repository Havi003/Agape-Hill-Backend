spring.application.name=agape_hill_backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jackson.serialization.indent_output=true

# Render supplies PORT in production. Local development defaults to 8080.
server.port=${PORT:8080}

# Comma-separated browser origins allowed to call the API.
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

########################################
# R2DBC (Runtime – Reactive access)
########################################
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?schema=${DB_SCHEMA:school}
spring.r2dbc.username=${DB_USERNAME}
spring.r2dbc.password=${DB_PASSWORD}

# Logs the SQL statements
logging.level.org.springframework.r2dbc=${R2DBC_LOG_LEVEL:INFO}

# Logs the actual values being bound to the $1, $2, etc.
logging.level.io.r2dbc.postgresql.QUERY=${R2DBC_QUERY_LOG_LEVEL:INFO}
logging.level.io.r2dbc.postgresql.PARAM=${R2DBC_PARAMETER_LOG_LEVEL:INFO}


# M-Pesa Transaction Details
mpesa.base-url=${MPESA_BASE_URL}
mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}
mpesa.short-code=${MPESA_SHORT_CODE:${MPESA_SHORTCODE:}}
mpesa.confirmation-url=${MPESA_CONFIRMATION_URL}
mpesa.validation-url=${MPESA_VALIDATION_URL}
mpesa.response-type=${MPESA_RESPONSE_TYPE:Completed}
